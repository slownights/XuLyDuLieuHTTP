{% extends "layout.html" %}
{% block content %}
<h2>Reset Password</h2>
<form id="reset_form">
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <div id="email_error" style="color: red;"></div>
    </div>
    <br>
    <button type="submit">Send Reset Link</button>
    <div id="reset_error" style="color: red;"></div>
</form>
<div id="reset_result" style="display: none;">
    <p id="reset_message" style="color: green;"></p>
    <!-- [HOST HEADER INJECTION] -->
    <!-- reset_link is shown here for demo purposes only -->
    <!-- in a real app this would be sent via email, never shown in the browser -->
    <p>Reset link: <a id="reset_link" href="#"></a></p>
</div>
<p>
    <a href="/login">Back to login</a>
</p>
{% endblock content %}

{% block scripts %}
<script>
    const reset_form = document.getElementById("reset_form");
    const reset_result = document.getElementById("reset_result");
    const reset_message = document.getElementById("reset_message");
    const reset_link_el = document.getElementById("reset_link");
    const reset_error = document.getElementById("reset_error");

    reset_form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const email = document.getElementById("email").value.trim();
        reset_error.textContent = "";
        reset_result.style.display = "none";

        try {
            const response = await fetch(`/api/users/reset-password?email=${encodeURIComponent(email)}`, {
                method: "POST",
            });

            const result = await response.json();

            if (response.ok) {
                reset_result.style.display = "block";
                reset_message.textContent = result.message || "Reset link generated.";

                // show the reset link if returned (demo only — in production this is emailed)
                if (result.reset_link) {
                    reset_link_el.textContent = result.reset_link;
                    reset_link_el.href = result.reset_link;
                } else {
                    reset_link_el.parentElement.style.display = "none";
                }
            } else {
                reset_error.textContent = result.detail || "Something went wrong.";
            }
        } catch (error) {
            reset_error.textContent = "Could not connect to the server.";
        }
    });
</script>
{% endblock scripts %}
